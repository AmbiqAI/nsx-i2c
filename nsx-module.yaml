schema_version: 1

module:
  name: nsx-i2c
  type: backend_specific
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_i2c
    targets:
      - nsx::i2c

depends:
  required:
    - nsx-core
    - nsx-harness
    - nsx-soc-hal
  optional: []

compatibility:
  boards:
    - "*"
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
